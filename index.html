<style>
:root {
  --bg-top: #16181b;
  --bg-bottom: #101113;
  --card: rgba(255,255,255,0.06);

  --text: #ffffff;

  --green: #86ffb1;
  --green-bg: rgba(0,255,100,0.12);
  --blue: #95cfff;
  --blue-bg: rgba(0,140,255,0.12);
  --red: #ff9f9f;
  --red-bg: rgba(255,90,90,0.12);
  --yellow: #ffd866;
  --yellow-bg: rgba(255,208,0,0.12);

* {
  box-sizing: border-box;
}

html {
  height: 100%;
  background: #111214;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  margin: 0;
  min-height: 100dvh;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 35%),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  padding:
    calc(1rem + env(safe-area-inset-top))
    1rem
    calc(1rem + env(safe-area-inset-bottom))

}

.wrapper {
  max-width: 920px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  font-size: 1.8rem;
  margin: 0 0 1rem 0;
  letter-spacing: -0.02em;
}

.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 1rem;
  margin-bottom: 1rem;
  backdrop-filter: blur(16px);

  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
}

.controls {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.75rem;
}

@media (min-width: 760px) {
  .controls {

}

label {

  font-size: 0.82rem;

  margin-bottom: 0.35rem;
}

select {

  background: rgba(255,255,255,0.06);

button {

  border: none;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,50,50,0.95), rgba(220,30,30,0.92));

  font-weight: 700;
  cursor: pointer;
  transition: transform 0.18s ease, opacity 0.18s ease;
}

button:hover {

button:disabled {

}

.small {

.grid {

@media (min-width: 900px) {

.section-main {

.station-summary {

.station-row {

.station-name {

.station-price {

.meta {

.badge {

  border-radius: 999px;
  font-size: 0.76rem;

.badge-good {

.badge-info {

.station-details {

.detail-line {

  flex-direction: column;
  gap: 0.2rem;
  margin-top: 0.8rem;
}
</style>

function pad2(value) {
  return String(value).padStart(2, "0");
}

function formatWindow(startHour, duration = 2) {
  const endHour = (startHour + duration) % 24;
  return `${pad2(startHour)}:00–${pad2(endHour)}:00`;
}

function formatDistance(distanceKm) {
  if (distanceKm < 1) return `${Math.round(distanceKm * 1000)} m`;
  return `${distanceKm.toFixed(1)} km`;
}

function setLoadingState(isLoading) {

function getWindowStart(hour) {
  return Math.floor(hour / 2) * 2;
}

function buildStationHistoryMap(rows) {
  const map = new Map();
  for (const row of rows) {
    if (!row.station_id || typeof row.price !== "number") continue;
    if (!map.has(row.station_id)) map.set(row.station_id, []);
    map.get(row.station_id).push(row);
  }
  return map;
}

function getLastTwoPricesForStation(rows, stationId) {
  const filtered = rows
    .filter(r => r.station_id === stationId && typeof r.price === "number")
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  const uniquePrices = [];
  for (const row of filtered) {
    if (!uniquePrices.length || uniquePrices[uniquePrices.length - 1] !== row.price) {
      uniquePrices.push(row.price);
    }
    if (uniquePrices.length === 2) break;
  }
  return uniquePrices;
}

function getTrendLabel(currentPrice, lastTwoPrices) {
  if (!lastTwoPrices || lastTwoPrices.length < 2) return { text: "kein Trend", cls: "" };

  const previous = lastTwoPrices[1];
  const diff = currentPrice - previous;

  if (diff <= -0.005) return { text: "Preis fällt", cls: "badge-good" };
  if (diff >= 0.005) return { text: "Preis steigt", cls: "badge-bad" };
  return { text: "Preis stabil", cls: "badge-warn" };
}

function getCurrentValueBadge(currentPrice, avg) {
  if (typeof avg !== "number") return { text: "noch keine Einordnung", cls: "" };

  const diff = currentPrice - avg;

  if (diff <= -0.015) return { text: "historisch günstig", cls: "badge-good" };
  if (diff <= 0.015) return { text: "historisch normal", cls: "badge-warn" };
  return { text: "historisch eher teuer", cls: "badge-bad" };
}

function aggregateWindows(rows, filterFn = null) {
  const buckets = new Map();

  for (const row of rows) {
    if (typeof row.price !== "number") continue;
    if (filterFn && !filterFn(row)) continue;

    const startHour = getWindowStart(row.hour);
    const key = `${row.day}-${startHour}`;

    if (!buckets.has(key)) {
      buckets.set(key, {
        day: row.day,
        startHour,
        prices: []
      });
    }

    buckets.get(key).prices.push(row.price);
  }

  let best = null;

  for (const bucket of buckets.values()) {
    if (bucket.prices.length < 2) continue;

    const avg = bucket.prices.reduce((sum, p) => sum + p, 0) / bucket.prices.length;
    const candidate = {
      day: bucket.day,
      startHour: bucket.startHour,
      avg,
      samples: bucket.prices.length
    };

    if (!best || candidate.avg < best.avg) best = candidate;
  }

  return best;
}

function aggregateWindowsForStation(rows, stationId) {
  return aggregateWindows(rows, row => row.station_id === stationId);
}

function getCurrentWindowAverageForStation(rows, stationId, day, hour) {
  const startHour = getWindowStart(hour);
  const filtered = rows.filter(r =>
    r.station_id === stationId &&
    r.day === day &&
    getWindowStart(r.hour) === startHour &&
    typeof r.price === "number"
  );

  if (filtered.length < 2) return null;
  return filtered.reduce((sum, r) => sum + r.price, 0) / filtered.length;
}

function getCurrentWindowAverageOverall(rows, day, hour) {
  const startHour = getWindowStart(hour);
  const filtered = rows.filter(r =>
    r.day === day &&
    getWindowStart(r.hour) === startHour &&
    typeof r.price === "number"
  );

  if (filtered.length < 2) return null;
  return filtered.reduce((sum, r) => sum + r.price, 0) / filtered.length;
}

async function fetchHistoryRows() {
  const since = new Date();
  since.setDate(since.getDate() - HISTORY_DAYS);

  const { data, error } = await supabaseClient
    .from("prices")
    .select("station_id,price,hour,day,created_at,fuel_type")
    .eq("fuel_type", currentFuel)
    .gte("created_at", since.toISOString())
    .order("created_at", { ascending: true });

  if (error) throw error;
  return data || [];
}

async function getRecentRowsForSaveCheck() {
  const since = new Date(Date.now() - SAVE_COOLDOWN_MS);

  const { data, error } = await supabaseClient
    .from("prices")
    .select("station_id,price,created_at,fuel_type")
    .eq("fuel_type", currentFuel)
    .gte("created_at", since.toISOString())
    .order("created_at", { ascending: false });

  if (error) throw error;
  return data || [];
}

function buildLatestStationPriceMap(rows) {
  const latest = new Map();
  for (const row of rows) {
    if (!latest.has(row.station_id)) latest.set(row.station_id, row.price);
  }
  return latest;
}

function haveStationPricesChanged(currentStations, latestMap) {
  if (!latestMap.size) return true;

  for (const station of currentStations) {
    if (!latestMap.has(station.id)) return true;
    const lastPrice = latestMap.get(station.id);
    if (Math.abs(Number(lastPrice) - Number(station.price)) >= 0.001) return true;
  }

  return false;
}

async function savePricesIfNeeded(stations) {
  try {
    const recentRows = await getRecentRowsForSaveCheck();
    const latestMap = buildLatestStationPriceMap(recentRows);
    const hasChanges = haveStationPricesChanged(stations, latestMap);

    if (recentRows.length && !hasChanges) {
      const latestTime = new Date(recentRows[0].created_at);
      const nextSave = new Date(latestTime.getTime() + SAVE_COOLDOWN_MS);
      setSaveStatus(
        "Nicht neu gespeichert – keine Preisänderung, Cooldown bis " +
        nextSave.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })
      );
      return false;
    }

    const now = new Date();
    const rows = stations.map(s => ({
      station_id: s.id,
      price: s.price,
      hour: now.getHours(),
      day: now.getDay(),
      fuel_type: currentFuel
    }));

    const { error } = await supabaseClient.from("prices").insert(rows);

    if (error) {
      console.error("Supabase Insert Fehler:", error);
      setSaveStatus("Speichern fehlgeschlagen");
      return false;
    }

    setSaveStatus("Daten gespeichert");
    return true;
  } catch (e) {
    console.error("Supabase Ausnahme:", e);
    setSaveStatus("Speichern fehlgeschlagen");
    return false;
  }
}

  `;
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const toRad = deg => deg * Math.PI / 180;
  const R = 6371;

  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) ** 2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function sortStations(stations) {
  return [...stations].sort((a, b) => {
    if (currentSortMode === "distance") {
      const aDist = typeof a.distanceKm === "number" ? a.distanceKm : Infinity;
      const bDist = typeof b.distanceKm === "number" ? b.distanceKm : Infinity;

      if (Math.abs(aDist - bDist) > 0.001) return aDist - bDist;
      if (Math.abs(a.price - b.price) > 0.0001) return a.price - b.price;
      return a.originalIndex - b.originalIndex;
    }

    if (Math.abs(a.price - b.price) > 0.0001) return a.price - b.price;

    const aDist = typeof a.distanceKm === "number" ? a.distanceKm : Infinity;
    const bDist = typeof b.distanceKm === "number" ? b.distanceKm : Infinity;

    if (Math.abs(aDist - bDist) > 0.001) return aDist - bDist;
    return a.originalIndex - b.originalIndex;
  });
}

function renderRecommendationCard(stations, historyRows, bestToday, bestOverall) {
  const el = document.getElementById("recommendationCard");

  if (!stations.length) {
    el.innerHTML = `
      <div class="section-title">Empfehlung</div>
      <div class="small">Keine offenen Tankstellen verfügbar.</div>
    `;
    return;
  }

  const topStation = stations[0];
  const now = new Date();
  const currentWindowAvg = getCurrentWindowAverageOverall(historyRows, now.getDay(), now.getHours());

  let headline = "";
  let detail = "";
  let badgeClass = "";

  if (currentSortMode === "distance") {
    headline = "Nächstgelegene verfügbare Tankstelle";
    detail = `${topStation.name} ist aktuell die nächstgelegene Tankstelle aus deiner Liste.`;
    badgeClass = "badge-info";
  } else {
    if (typeof currentWindowAvg === "number") {
      const diff = topStation.price - currentWindowAvg;

      if (diff <= -0.02) {
        headline = "Aktuell empfehlenswert";
        detail = `${topStation.name} liegt derzeit unter dem üblichen Preisniveau dieses Zeitfensters.`;
        badgeClass = "badge-good";
      } else if (diff <= 0.01) {
        headline = "Preisniveau unauffällig";
        detail = `${topStation.name} liegt aktuell ungefähr im erwartbaren Bereich.`;
        badgeClass = "badge-warn";
      } else {
        if (bestToday && bestToday.startHour > now.getHours()) {
          headline = "Warten könnte sinnvoll sein";
          detail = `Für heute wirkt historisch eher ${formatWindow(bestToday.startHour, 2)} günstiger.`;
        } else if (bestOverall) {
          headline = "Historisch günstigeres Zeitfenster wahrscheinlich";
          detail = `Auffällig günstig ist oft ${DAY_NAMES[bestOverall.day]}, ${formatWindow(bestOverall.startHour, 2)}.`;
        } else {
          headline = "Aktuell eher über dem üblichen Bereich";
          detail = "Die momentanen Preise wirken historisch betrachtet eher erhöht.";
        }
        badgeClass = "badge-bad";
      }
    } else {
      headline = "Empfehlung derzeit eingeschränkt";
      detail = "Für eine belastbare Einordnung liegen noch nicht genug Daten vor.";
    }
  }

  const extra = typeof topStation.distanceKm === "number"
    ? ` • ${formatDistance(topStation.distanceKm)} entfernt`
    : "";

  el.innerHTML = `
    <div class="section-title">Empfehlung</div>
    <div class="section-main">${headline}</div>
    <div class="meta" style="margin-top:0; margin-bottom:0.45rem;">
      <span class="badge ${badgeClass}">${topStation.name} – ${currency.format(topStation.price)}${extra}</span>
      <span class="badge">${currentFuel.toUpperCase()}</span>
    </div>
    <div class="small">${detail}</div>
  `;
}

function renderStations(stations, historyRows) {
  const el = document.getElementById("stations");

  if (!stations.length) {
    el.innerHTML = "<div class='card'>Keine offenen Tankstellen</div>";
    return;
  }

  const now = new Date();
  const stationHistoryMap = buildStationHistoryMap(historyRows);
  const topStationId = stations[0].id;
  const topLabel = currentSortMode === "distance" ? "nächste Tankstelle" : "günstigster Preis";

  el.innerHTML = stations.map(station => {
    const stationRows = stationHistoryMap.get(station.id) || [];
    const bestStationTime = aggregateWindowsForStation(historyRows, station.id);
    const currentWindowAvg = getCurrentWindowAverageForStation(
      historyRows,
      station.id,
      now.getDay(),
      now.getHours()
    );
    const currentBadge = getCurrentValueBadge(station.price, currentWindowAvg);
    const trend = getTrendLabel(station.price, getLastTwoPricesForStation(historyRows, station.id));

    const bestTimeText = bestStationTime
      ? `${DAY_NAMES[bestStationTime.day]}, ${formatWindow(bestStationTime.startHour, 2)}`
      : "noch zu wenig Daten";

    const bestAvgText = bestStationTime
      ? currency.format(bestStationTime.avg)
      : "—";

    const isTop = station.id === topStationId;

    return `
      <details class="station ${isTop ? "is-top" : ""}">
        <summary class="station-summary">
          <div class="station-row">
            <div class="station-name">${station.name}</div>
            <div class="station-price">${currency.format(station.price)}</div>
          </div>

          <div class="meta">
            ${currentBadge.text !== "noch keine Einordnung" ? `<span class="badge ${currentBadge.cls}">${currentBadge.text}</span>` : ""}
            <span class="badge ${trend.cls}">${trend.text}</span>
            ${typeof station.distanceKm === "number" ? `<span class="badge badge-info">${formatDistance(station.distanceKm)}</span>` : ""}
            ${isTop ? `<span class="badge badge-good">${topLabel}</span>` : ""}
          </div>

          <div class="summary-hint">Details anzeigen</div>
        </summary>

        <div class="station-details">
          <div class="detail-line"><span class="dim">Beste Zeit für diese Tankstelle:</span> ${bestTimeText}</div>
          <div class="detail-line"><span class="dim">Ø bester 2h-Wert:</span> ${bestAvgText}</div>
          <div class="detail-line"><span class="dim">Datengrundlage:</span> ${stationRows.length} Werte</div>
          <div class="detail-line"><span class="dim">Entfernung:</span> ${typeof station.distanceKm === "number" ? formatDistance(station.distanceKm) : "nicht verfügbar"}</div>
        </div>
      </details>
    `;
  }).join("");
}

async function loadAndRenderInsights(stations) {
  try {
    latestHistoryRows = await fetchHistoryRows();
    const now = new Date();

    const bestToday = aggregateWindows(
      latestHistoryRows,
      row => row.day === now.getDay()
    );

    const bestOverall = aggregateWindows(latestHistoryRows);

    renderRecommendationCard(stations, latestHistoryRows, bestToday, bestOverall);
    renderBestTimeTodayCard(bestToday);
    renderBestTimeOverallCard(bestOverall);
    renderStations(stations, latestHistoryRows);
  } catch (e) {
    console.error("Fehler bei der Auswertung:", e);

    document.getElementById("recommendationCard").innerHTML = `
      <div class="section-title">Empfehlung</div>
      <div class="small">Auswertung konnte gerade nicht geladen werden.</div>
    `;

    document.getElementById("bestTimeTodayCard").innerHTML = `
      <div class="section-title">Beste Zeit heute</div>
      <div class="small">Auswertung konnte gerade nicht geladen werden.</div>
    `;

    document.getElementById("bestTimeOverallCard").innerHTML = `
      <div class="section-title">Beste Zeit allgemein</div>
      <div class="small">Auswertung konnte gerade nicht geladen werden.</div>
    `;

    renderStations(stations, []);
  }
}

async function initLocation() {
  if (!navigator.geolocation) {
    userLocation = null;
    updateLocationStatus();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (position) => {
      userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };
      updateLocationStatus();
      await updatePrices();
    },
    () => {
      userLocation = null;
      updateLocationStatus();
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 300000
    }
  );
}

async function updatePrices() {
  setLoadingState(true);

  const url = new URL("https://creativecommons.tankerkoenig.de/json/list.php");
  url.searchParams.set("lat", "50.1944");
  url.searchParams.set("lng", "10.0633");
  url.searchParams.set("rad", "15");
  url.searchParams.set("type", currentFuel);
  url.searchParams.set("sort", "price");
  url.searchParams.set("apikey", API_KEY);

  try {
    const res = await fetch(url.toString());
    const data = await res.json();

    if (!data || data.ok === false) {
      throw new Error(data?.message || "API Fehler");
    }

    const apiStations = data.stations || [];

    const rawStations = MY_STATIONS
      .map((my, index) => {
        const api = apiStations.find(s => String(s.id) === String(my.id));

        if (!api || !api.isOpen || typeof api.price !== "number") {
          return null;
        }

        let distanceKm = null;
        if (
          userLocation &&
          typeof api.lat === "number" &&
          typeof api.lng === "number"
        ) {
          distanceKm = haversineKm(
            userLocation.lat,
            userLocation.lng,
            api.lat,
            api.lng
          );
        }

        return {
          id: my.id,
          name: my.name,
          price: Number(api.price),
          distanceKm,
          originalIndex: index
        };
      })
      .filter(Boolean);

    const stations = sortStations(rawStations);

    updateLastUpdated();

    if (!stations.length) {
      document.getElementById("stations").innerHTML =
        "<div class='card'>Keine offenen Tankstellen</div>";
      setSaveStatus("Keine offenen Tankstellen");
      await loadAndRenderInsights([]);
      return;
    }

    await savePricesIfNeeded(stations);
    await loadAndRenderInsights(stations);
  } catch (e) {
    console.error(e);
    document.getElementById("stations").innerHTML =
      "<div class='card'>Fehler beim Laden</div>";

    document.getElementById("recommendationCard").innerHTML = `
      <div class="section-title">Empfehlung</div>
      <div class="small">Abruf fehlgeschlagen.</div>
    `;

    document.getElementById("bestTimeTodayCard").innerHTML = `
      <div class="section-title">Beste Zeit heute</div>
      <div class="small">Abruf fehlgeschlagen.</div>
    `;

    document.getElementById("bestTimeOverallCard").innerHTML = `
      <div class="section-title">Beste Zeit allgemein</div>
      <div class="small">Abruf fehlgeschlagen.</div>
    `;

    setSaveStatus("Abruf fehlgeschlagen");
  } finally {
    setLoadingState(false);
  }
}

updateLocationStatus();
updatePrices();
initLocation();
</script>
