<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Tank-Planer</title>

  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      margin: 0;
      padding: 1.5rem;
      background: #161616;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 1.2rem;
      font-weight: 700;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    button {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      background: rgba(255, 10, 10, 0.85);
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(255, 10, 10, 0.171);
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 25px rgba(255, 10, 10, 0.171);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      transform: none;
      box-shadow: none;
    }

    .station {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 0.9rem;
      margin-bottom: 0.7rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .station:hover {
      transform: translateY(-2px);
      background: rgba(0, 255, 64, 0.089);
    }

    .cheapest {
      border: 1px solid rgba(0, 255, 64, 0.8);
      background: rgba(0, 255, 64, 0.089);
    }

    .price {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 0.2rem;
    }

    .small {
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<h1>Tank-Planer</h1>

<div class="card">
  <button onclick="updatePrices()">Preise aktualisieren</button>
  <div id="lastUpdated" class="small" style="margin-top:0.6rem;"></div>
</div>

<div id="stations"></div>

<script>
const API_KEY = "384f0ab6-7241-96b5-539f-12bec0b1d310";
const FUEL = "e5";

const MY_STATIONS = [
  { id: "5d7f3329-7a3f-4dcb-ab3d-4d6d757ae1c0", name: "Walther Kreisel" },
  { id: "53e1e50e-dc52-4150-b404-6fcc81eca89c", name: "Esso Einkaufsmeile" },
  { id: "ab5c8843-22b9-4fc4-82a1-028f33b37d04", name: "Walther Schlachthof" },
  { id: "51d4b486-a095-1aa0-e100-80009459e03a", name: "Jet McDonalds" },
  { id: "d6d40bb4-fe48-46b8-b055-d3e59ae49589", name: "Walther Schule" },
  { id: "f7624aa5-3cfd-473e-b89c-3740b48a8fcf", name: "Avia Gofit" },
  { id: "c7e55829-fcf0-43d2-8bb7-ed0400c23405", name: "Walther Nüdlingen" },
  { id: "76a49899-b0f5-4738-8126-4aa71e5cb2f0", name: "Esso Stangenroth" },
  { id: "0fdcfef5-75e0-4f5b-a444-5281c7c73d33", name: "Aral Burkadroth" },
  { id: "e83d7841-fce8-4b29-bdaa-85c2ca061532", name: "Aral Euerdorf" },
  { id: "371fbe9a-1e56-4bd8-9213-eb6d3a3ec0c5", name: "Walther Oberthulba" },
  { id: "4924d8e1-ee25-4a48-a7fc-4f705ac81166", name: "HEM Örlenbach" }
];

const currency = new Intl.NumberFormat("de-DE", {
  style: "currency",
  currency: "EUR"
});

function updateLastUpdated() {
  const el = document.getElementById("lastUpdated");
  const now = new Date();

  el.textContent =
    "Letztes Update: " +
    now.toLocaleString("de-DE", {
      day: "2-digit",
      month: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    }) +
    " Uhr";
}

async function updatePrices() {
  const url = new URL("https://creativecommons.tankerkoenig.de/json/list.php");

  url.searchParams.set("lat", "50.1944");
  url.searchParams.set("lng", "10.0633");
  url.searchParams.set("rad", "10");
  url.searchParams.set("type", "e5");
  url.searchParams.set("sort", "price");
  url.searchParams.set("apikey", API_KEY);

  try {
    const res = await fetch(url.toString());

    const data = await res.json();

    if (!data || data.ok === false) {
      throw new Error(data?.message || "API Fehler");
    }

    let stations = (data.stations || [])
      .filter(s =>
        s.isOpen &&
        typeof s.price === "number" &&
        MY_STATIONS.some(m => String(m.id) === String(s.id))
      )
      .map(s => ({
        ...s,
        price: Number(s.price),
        displayName: MY_STATIONS.find(m => m.id === s.id)?.name || s.name
      }))
      .sort((a, b) => a.price - b.price);

    render(stations);
    updateLastUpdated();

  } catch (e) {
    console.error(e);
    document.getElementById("stations").innerHTML =
      "<div class='card'>Fehler beim Laden der Preise</div>";
  }
}

function render(stations) {
  const el = document.getElementById("stations");

  if (!stations.length) {
    el.innerHTML = "<div class='card'>Keine Daten verfügbar</div>";
    return;
  }

  el.innerHTML = stations.map((s, i) => `
    <div class="station ${i === 0 ? "cheapest" : ""}">
      <b>${s.displayName}</b>
      <div class="price">${currency.format(s.price)}</div>
    </div>
  `).join("");
}

updatePrices();
</script>

</body>
</html>
